<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .decoration{
            justify-self: center;
            text-align: center;
            font-size: 30px;
            width: 700px;
            background: white;
            border-radius: 10px;
        }

        .decoration h1{
            color: indigo;
        }

    .otp-container{
    display: flex;
    gap: 20px;
    justify-content: center;
}
.otp-input{
          width: 50px;
            height: 50px;
            text-align: center;
            font-size: 24px;
            border: none;
            border-radius: 8px;
            background-color: white;
            color: black;
        }

        .button{
            width: 700px;
            height: 100px;
            border-radius: 10px;
            background-color: indigo;
            color: white;
            font-size: 30px;
            font-width: bold;
        
        }

        .container{
            justify-self: center;
            
        }

        .one{
            justify-self: center;
        }

        .error{
            justify-self: center;
            font-size: 30px;
            font-weight: bold;
        }

    </style>
</head>
<body style="background: #f3f3f3;">
    


{% for message in messages %}
    
    <h3 style="color: green;" class="error">{{ message }}</h3>
{% endfor %}

<div class="decoration">
    <h1>Confirm Purchase</h1>

<p>
Phone:
{{ phone }}
</p>

<p>
Network:
{{ network }}
</p>

<p>
Plan:
{{ plan_name }}
</p>

<p>
Amount:
₦{{ amount }}
</p>
</div>
<form method="POST">

    {% csrf_token %}

    <div class="otp-container">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">

            <input type="hidden" name="pin" id="pin">
        </div><br><br>

    <br><br><br><br><br><br><br>

    <div class="one">
    <button type="submit" class="button">
        Pay Now
    </button>
</div>

</form>



<script>
const inputs = document.querySelectorAll('.otp-input');
const otpField = document.getElementById('pin'); // changed to "pin"

inputs.forEach((input, index) => {

    // Move forward on input
    input.addEventListener('input', function () {
        if (this.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }

        updateOTP();
    });

    // Move back on backspace
    input.addEventListener('keydown', function (e) {
        if (e.key === 'Backspace' && this.value === '' && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

// Combine OTP into hidden input
function updateOTP() {
    let otp = '';

    inputs.forEach(box => {
        otp += box.value;
    });

    otpField.value = otp;
}
</script>

</body>
</html>
