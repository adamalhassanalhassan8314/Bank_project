<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>
       .input-box{
    position: relative;
    width: 700px;
    padding: 10px;
    padding: 20px;
    text-align: center;
}

.input-box input{
    width: 105%;
    height: 100px;
    padding: 20px;
    padding-right: 60px;
    border-radius: 15px;
}

.input-box i{
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 30px;
}
    </style>



     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class=" d-flex flex-column  justify-content-center align-items-center" style="height: 94vh; background-color: indigo;"><br><br><br><br><br><br>


      <h1 style="color: white;">GET YOUR B2DATA NOW </h1>
     <div class="card main-card p-4  col-md-5 mx-auto" style="background-color: #f3f3f3;">
                     <h4 class="text-center mb-3" style="color: indigo;">Create An Account</h4>
{% block content %}
        <form method="POST">
            {% csrf_token %}
            <div class="input-box">
            <input type="text" name="username"  placeholder="Enter Username" required>
            <i  class="bi bi-person-fill"></i>
            </div>
            
             <div class="input-box">
            <input type="text" name="fullname" placeholder="Enter Your Full_Name" required>
              <i  class="bi bi-person-fill"></i>
            </div>

            <div class="input-box">
            <input type="email" name="email"  placeholder="Eneter Your Email Address" required>
              <i class="bi bi-envelope-fill"></i>
            </div>

            <div class="input-box">
            <input type="number" name="phone" placeholder="Enter Your Phone_Number" required>
            <i class="bi bi-telephone-fill"></i>
            </div>

            <div class="input-box">
            <input type="password" name="password"  placeholder="Enter Your Password" required>
            <i class="bi bi-lock-fill"></i>
            </div>

               <div class="input-box">
            <button   type="submit" class="btn  mt-3"  style="background-color: indigo; color: white; width: 700px; height: 100px; font-size: 30px;">Register</button>
            </div>
        </form>
{% endblock %}
        {% if error %}
    <div class="alert alert-danger mt-2">{{ error }}</div>
    {% endif %}

    <p class="text-center mt-3">
        Already have account? <a href="{% url 'login' %}">Login</a>
    </p>

     </div>

</html>
