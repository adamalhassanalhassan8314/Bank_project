<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    

        <style>

.network-card{
    background:#f5f5f5;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    border:1px solid #ddd;
}

.network-card.active{
    background:#e8fff1;
    border:2px solid #198754;
}

.plan-card{
    background:#f8f8f8;
    border-radius:12px;
    padding:12px;
    cursor:pointer;
    border:1px solid #ddd;
    height:100%;
}

.plan-card.active{
    background:#d9d9d9;
    border:2px solid #198754;
}

.plan-name{
    font-size:14px;
    font-weight:600;
}

.plan-price{
    font-size:16px;
    font-weight:bold;
    color:#198754;
    margin-top:8px;
}

</style>

    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    

    <form method="POST">
    {% csrf_token %}

    <!-- Phone -->
    <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="text"
               name="phone"
               class="form-control form-control-lg"
               placeholder="Enter phone number">
    </div>

    <!-- Network -->
    <div class="mb-3">
        <label class="form-label">Select Network</label>

        <div class="row g-2">

            <div class="col-3">
                <div class="network-card text-center p-3"
                     data-network="MTN">
                    MTN
                </div>
            </div>

            <div class="col-3">
                <div class="network-card text-center p-3"
                     data-network="Airtel">
                    Airtel
                </div>
            </div>

            <div class="col-3">
                <div class="network-card text-center p-3"
                     data-network="Glo">
                    GLO
                </div>
            </div>

            <div class="col-3">
                <div class="network-card text-center p-3"
                     data-network="m_9mobile">
                    9Mobile
                </div>
            </div>

        </div>
    </div>

    <!-- Plans -->
    <div class="mb-3 mt-4">
        <label class="form-label">Data Plans</label>

        <div id="plans-container"
             class="row g-2">
        </div>
    </div>

    <!-- Hidden Inputs -->
    <input type="hidden"
           name="network"
           id="network">

    <input type="hidden"
           name="plan_id"
           id="plan_id">

    <input type="hidden"
           name="plan_name"
           id="plan_name">

    <input type="hidden"
           name="amount"
           id="amount">

    <!-- Amount -->
    <div class="mb-3">
        <label class="form-label">
            Amount
        </label>

        <input type="text"
               id="amount_display"
               class="form-control"
               readonly>
    </div>

    <button type="submit"
            class="btn btn-success w-100">
        Continue
    </button>

</form>


<script>

const networks = {{ networks_json|safe }};

const plansContainer =
document.getElementById("plans-container");

document
.querySelectorAll(".network-card")
.forEach(card => {

    card.addEventListener("click", function(){

        document
        .querySelectorAll(".network-card")
        .forEach(c =>
            c.classList.remove("active")
        );

        this.classList.add("active");

        let network =
        this.dataset.network;

        document
        .getElementById("network")
        .value = network;

        loadPlans(network);
    });
});

function loadPlans(network){

    plansContainer.innerHTML = "";

    let plans =
    networks[network].plans;

    plans.forEach(function(plan){

        let col =
        document.createElement("div");

        col.className = "col-6";

        col.innerHTML = `

        <div class="plan-card">

            <div class="plan-name">
                ${plan.PRODUCT_NAME}
            </div>

            <div class="plan-price">
                ₦${plan.SELL_PRICE}
            </div>

        </div>

        `;

        let card =
        col.querySelector(".plan-card");

        card.addEventListener(
            "click",
            function(){

                document
                .querySelectorAll(".plan-card")
                .forEach(c =>
                    c.classList.remove("active")
                );

                this.classList.add("active");

                document
                .getElementById("plan_id")
                .value =
                plan.PRODUCT_ID;

                document
                .getElementById("plan_name")
                .value =
                plan.PRODUCT_NAME;

                document
                .getElementById("amount")
                .value =
                plan.SELL_PRICE;

                document
                .getElementById("amount_display")
                .value =
                "₦" +
                plan.SELL_PRICE;
            }
        );

        plansContainer
        .appendChild(col);

    });
}

</script>
</body>
</html>
