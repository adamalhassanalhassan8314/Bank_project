
{% extends 'base.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .top{
            background-color: white;
            width: 800px;
            height: 800px;
            justify-self: center;
            justify-content: center;
            border: 1px solid;
            padding: 20px;
            margin-top: 100px;
            border-radius: 10px;
            align-items: center;
            justify-items: center;
            background-color: #f3f3f3;
            border: none;

        }

        .account{
            padding: 20px;
            margin: 20px;
            width: 600px;
            background-color: white;
            border-radius: 8px;
        }
        input{
            padding: 20px;
            margin: 10px;
            width: 500px;
            background-color: #f3f3f3;
            border: none;
            text-align: center;
            color:  indigo;
            
        }

        .button{
            padding: 20px;
            margin: 20px;
            width: 300px;
            background-color: white;
            border-radius: 8px;
            border: none;
            background-color: indigo;
            color: white;
        }

        .give{
            justify-self: center;
        }
        h3{
            justify-self: center;
            color: indigo;
        }
    </style>
</head>
<bodystyle="background-color: white;>


    
     <h3>Transfer Your money now</h3>
    <div class="top">
<form method="POST">

    {% csrf_token %}

    <div class="account">
    <input type="text"
    name="account_number"
    placeholder="Account Number">
    </div>
<br><br>
 
     <div class="give">
    <select name="bank_code" class="account">

    <option value="044">
        Access Bank
    </option>

    <option value="011">
        First Bank
    </option>

    <option value="058">
        GTBank
    </option>

    <option value="999992">
        Opay
    </option>

    <option value="090267">
        Kuda Bank
    </option>

    <option value="232">
        Sterling Bank
    </option>

    <option value="033">
        UBA
    </option>

    <option value="057">
        Zenith Bank
    </option>
    <option value="50515">
        Moniepoint
    </option>

    <option value="100033">
        palmpay
    </option>
</select>
</div>
<br><br>

     <div class="account">
    <input type="number"
    name="amount"
    placeholder="Amount">
    </div>
    <br><br>

    <div class="give">
     <button type="submit" class="button">
        Verify Account
    </button>
    </div>


</form>

</div>
{% endblock %}

</body>
</html>
