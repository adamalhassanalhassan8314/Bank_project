
{% extends 'base2.html' %}
{% block content %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
      .input-box{
    position: relative;
    width: 700px;
    padding: 10px;
    padding: 20px;
    text-align: center;
}

.input-box input{
    width: 105%;
    height: 100px;
    padding: 20px;
    padding-right: 60px;
    border-radius: 15px;
}

.input-box i{
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 30px;
}
      
    /* .two{
      align-items: end;
      height: 100px;
      width: 200px;
      background-color: #f3f3f3;
    } */
    </style>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="d-flex flex-column justify-content-center align-items-center" style="height:100vh;">

  <div class="w-100 d-flex justify-content-end" style="width: 300px; height: 200px; ">
    <div class="logo" style="width: 300px; height: 100px; color: indigo; background-color: #f3f3f3; justify-self: center; text-align: center; align-content: center; border-radius: 8px; "><h1>B2DATA</h1></div>
</div>

  <h3 style="color: indigo;">login in to your B2DATA</h3>
    
    <div  class="card main-card p-4  col-md-5 mx-auto" style="background-color: #f3f3f3; ">
    
        <h4 class="text-center mb-3" style="color: indigo;">Login</h4>
      <form method="POST" >
        {% csrf_token %}

        <div class="input-box">
        <input type="text" name="username"  placeholder="Enter Username">
        <i class="bi bi-person-fill"></i>
        </div>

        <div class="input-box">
        <input type="password" name="password"  placeholder="Enter Password">
        <i class="bi bi-lock-fill"></i>
        </div>

        <button type="submit" class=" w-100 mb-3 p-3" style="background: indigo; border-radius: 5px; color: white;" >
          <i class="bi bi-arrow-right"></i>
          Login</button>

        <p style="text-align:end;">
       <a href= "{% url 'register' %}">Forgot Password</a>
        </p>



      </form>

    </div>

{% endblock %}


</body>
</html>
