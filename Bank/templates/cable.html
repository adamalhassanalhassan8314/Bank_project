```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.provider-card{
    background:#f8f8f8;
    border-radius:12px;
    padding:15px;
    text-align:center;
    cursor:pointer;
    border:1px solid #ddd;
    font-weight:bold;
}

.provider-card.active{
    background:#d9d9d9;
    border:2px solid #198754;
}

.plan-card{
    background:#f8f8f8;
    border-radius:12px;
    padding:12px;
    cursor:pointer;
    border:1px solid #ddd;
    height:100%;
}

.plan-card.active{
    background:#d9d9d9;
    border:2px solid #198754;
}

.plan-name{
    font-size:14px;
    font-weight:600;
}

.plan-price{
    font-size:16px;
    font-weight:bold;
    color:#198754;
    margin-top:8px;
}

</style>

</head>
<body>

<div class="container mt-4">

<form method="POST">
{% csrf_token %}

<h3 class="mb-3">Cable Subscription</h3>

<div class="row g-2">

    <div class="col-4">
        <div class="provider-card" data-provider="DSTV">
            DStv
        </div>
    </div>

    <div class="col-4">
        <div class="provider-card" data-provider="GOTV">
            GOtv
        </div>
    </div>

    <div class="col-4">
        <div class="provider-card" data-provider="STARTIMES">
            Startimes
        </div>
    </div>

</div>

<input type="hidden" name="provider" id="provider">

<div class="mt-4">
    <label>Smart Card Number</label>

    <input
        type="text"
        name="smartcard"
        class="form-control"
        placeholder="Enter Smart Card Number">
</div>

<div class="mb-3 mt-4">

    <label class="form-label">
        Cable Package
    </label>

    <div id="plans-container"
         class="row g-2">
    </div>

</div>

<input type="hidden" name="package" id="package">
<input type="hidden" name="package_name" id="package_name">
<input type="hidden" name="amount" id="amount">

<div class="mt-3">

    <label>Amount</label>

    <input
        type="text"
        id="amount_display"
        class="form-control"
        readonly>

</div>

<button
    type="submit"
    class="btn btn-success w-100 mt-4">

    Continue

</button>

</form>

</div>

<script>

const cables = {{ cables_json|safe }};

const plansContainer =
document.getElementById("plans-container");

document
.querySelectorAll(".provider-card")
.forEach(card => {

    card.addEventListener("click", function(){

        document
        .querySelectorAll(".provider-card")
        .forEach(c =>
            c.classList.remove("active")
        );

        this.classList.add("active");

        let provider =
        this.dataset.provider;

        document
        .getElementById("provider")
        .value = provider;

        loadPlans(provider);

    });

});

function loadPlans(provider){

    plansContainer.innerHTML = "";

    let plans =
    cables[provider].plans;

    plans.forEach(function(plan){

        let col =
        document.createElement("div");

        col.className = "col-6";

        col.innerHTML = `

        <div class="plan-card">

            <div class="plan-name">
                ${plan.description}
            </div>

            <div class="plan-price">
                ₦${plan.amount}
            </div>

        </div>

        `;

        let card =
        col.querySelector(".plan-card");

        card.addEventListener(
            "click",
            function(){

                document
                .querySelectorAll(".plan-card")
                .forEach(c =>
                    c.classList.remove("active")
                );

                this.classList.add("active");

                document
                .getElementById("package")
                .value =
                plan.code;

                document
                .getElementById("package_name")
                .value =
                plan.description;

                document
                .getElementById("amount")
                .value =
                plan.amount;

                document
                .getElementById("amount_display")
                .value =
                "₦" + plan.amount;

            }
        );

        plansContainer
        .appendChild(col);

    });

}

</script>

</body>
</html>
```
