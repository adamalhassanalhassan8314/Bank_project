<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <style>
    
    body{
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

.top-info{
    text-align:center;
    margin-top:30px;
}

.top-info h3{
    color:indigo;
}

.amount-display{
    text-align:center;
    margin-top:50px;
}

.amount-display h1{
    font-size:60px;
    font-weight:bold;
}

.amount-display p{
    color:#8a4fff;
    font-size:24px;
}

.amount-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    max-width:800px;
    margin:50px auto;
}

.amount-box{
    background:white;
    height:120px;
    border-radius:20px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:32px;
    font-weight:bold;

    cursor:pointer;
    border:2px solid #eee;
}

.amount-box.active{
    border:3px solid indigo;
}

.continue-btn{
    display:block;
    margin:50px auto;

    width:400px;
    height:70px;

    background:indigo;
    color:white;
    border:none;
    border-radius:15px;

    font-size:24px;
}





.amount-input{
    border:none;
    background:transparent;
    font-size:60px;
    font-weight:bold;
    width:220px;
    outline:none;
    color:white;
}

/* .naira-sign{
    font-size:60px;
    font-weight:bold;
}

.amount-display{
    display:flex;
    align-items:center;
    justify-content: center;
    gap:0;
    background-color: indigo;
} */

.amount-display{
    display:flex;
    justify-content:center;
    align-items:center;
    background:indigo;
    padding:20px;
}

.naira-sign{
    color:white;
    font-size:60px;
    font-weight:bold;
}

.amount-display input{
    color: white;
}

.amount-display span{
    color: white;
    justify-self: center;
}

</style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    

   
</head>
<body style="background-color: white;">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>



<form method="POST">
    {% csrf_token %}

    <div class="top-info">
        <h3>{{ network }}</h3>
        <p>{{ phone }}</p>
    </div>

    <div class="amount-display">
        <span class="naira-sign">₦</span>
    <input
        type="number"
        name="amount"
        id="amountInput"
        value="100"
        class="amount-input" 
    >

</div>


    <div class="amount-grid">

        <div class="amount-box active" data-amount="100">
            ₦100
        </div>

        <div class="amount-box" data-amount="200">
            ₦200
        </div>

        <div class="amount-box" data-amount="300">
            ₦300
        </div>

        <div class="amount-box" data-amount="500">
            ₦500
        </div>

        <div class="amount-box" data-amount="1000">
            ₦1000
        </div>

        <div class="amount-box" data-amount="2000">
            ₦2000
        </div>

    </div>

    <button type="submit" class="continue-btn">
        Continue
    </button>
    

</form>


<script>
const amountBoxes =
document.querySelectorAll(".amount-box");

const amountInput =
document.getElementById("amountInput");

amountBoxes.forEach(box => {

    box.addEventListener("click", function(){

        amountBoxes.forEach(item => {
            item.classList.remove("active");
        });

        this.classList.add("active");

        amountInput.value =
        this.dataset.amount;

    });

});



</script>
</body>
</html>
