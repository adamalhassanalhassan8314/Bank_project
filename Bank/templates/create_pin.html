<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .otp-container{
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .otp-input{
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 24px;
            border: none;
            border-radius: 8px;
            background-color: #f3f3f3;
            color: black;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class=" d-flex justify-content-center align-items-center bg-dark" style="height: 94vh;" >
    
    <div class="card main-card p-4 bg-white col-md-5 mx-auto" style="align-items: center;">
        <h2>CREATE PIN</h2><br>
    <form method="POST">
        {% csrf_token %}
        <div style="text-align: center;" >
        <div class="otp-container">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">

            <input type="hidden" name="pin" id="pin">
        </div><br><br>
        <button type="submit" style="background-color: indigo; border-radius: 5px; color: white;" class="p-3 mb-3 w-80">save pin</button>
        </div>

    </form>

    </div>

    <script>
const inputs = document.querySelectorAll('.otp-input');
const otpField = document.getElementById('pin'); // changed to "pin"

inputs.forEach((input, index) => {

    // Move forward on input
    input.addEventListener('input', function () {
        if (this.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }

        updateOTP();
    });

    // Move back on backspace
    input.addEventListener('keydown', function (e) {
        if (e.key === 'Backspace' && this.value === '' && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

// Combine OTP into hidden input
function updateOTP() {
    let otp = '';

    inputs.forEach(box => {
        otp += box.value;
    });

    otpField.value = otp;
}
</script>


</body>
</html>
